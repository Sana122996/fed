<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金十期货长图生成器 - 终极三模版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --btn-primary: #1890ff;
            --btn-danger: #ff4d4f;
            --btn-success: #52c41a;
            --border-color: #e4e7ed;
            --usda-color: #52c41a;
        }

        body { margin: 0; padding: 0; font-family: 'Noto Sans SC', sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #222; }

        /* ================= 左侧控制台 ================= */
        .left-panel { width: 480px; min-width: 480px; background: #ffffff; height: 100vh; overflow-y: auto; box-shadow: 2px 0 15px rgba(0,0,0,0.3); z-index: 10; display: flex; flex-direction: column; }
        .mode-switcher { display: flex; background: #fff; padding: 15px 15px 0; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 20; }
        .mode-tab { flex: 1; text-align: center; padding: 12px 5px; font-size: 15px; font-weight: 900; cursor: pointer; color: #999; border-bottom: 3px solid transparent; transition: 0.3s;}
        .mode-tab.active { color: var(--btn-primary); border-bottom-color: var(--btn-primary); }
        .panel-body { padding: 25px; flex: 1; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #606266; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
        .rates-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .rate-item { background: #f8f9fb; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); text-align: center; position: relative; }
        .rate-item label { font-size: 12px; margin-bottom: 4px; display: block; color: #666; font-weight: bold;}
        .rate-item input { width: 90%; text-align: center; font-weight: bold; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
        .rate-item-close { position: absolute; top: -6px; right: -6px; background: var(--btn-danger); color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; line-height: 18px; text-align: center; cursor: pointer; }
        .btn-add { flex: 1; background: var(--btn-primary); color: #fff; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; transition: 0.2s;}
        .btn-add:hover { opacity: 0.9; }
        .btn-cancel { background: #999; color: #fff; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; display: none; }
        
        .data-list-title { font-size: 16px; font-weight: bold; margin: 30px 0 15px; color: #333; border-left: 4px solid var(--btn-primary); padding-left: 10px; display: flex; justify-content: space-between; align-items: center;}
        .data-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 8px; }
        .btn-edit { background: var(--btn-success); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 4px;}
        .btn-delete { background: var(--btn-danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .panel-footer { padding: 20px; background: #fff; border-top: 1px solid var(--border-color); text-align: center;}

        /* ================= 右侧预览区 ================= */
        .right-panel { flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; background-color: #2a2a2a; padding: 40px 0; box-sizing: border-box; }
        
        #poster-scale-wrapper { transform-origin: top center; transition: transform 0.3s; margin-bottom: 100px; }
        
        .poster-container { position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transition: width 0.3s ease; background-color: #12182b;}
        .header-image img { width: 100%; display: block; }
        
        .timeline-container { padding: 50px 40px 20px; position: relative; }
        .event-card { margin-bottom: 80px; position: relative; }
        .event-header { display: flex; align-items: center; margin-bottom: 24px; min-height: 70px; }
        .event-date { font-size: 42px; font-weight: 900; margin-right: 24px; }
        .event-tag { font-size: 24px; padding: 6px 18px; border-radius: 24px; font-weight: 700; color: #fff; }
        .event-desc { font-size: 28px; line-height: 1.8; margin-bottom: 40px; text-align: justify; }
        .chart-box { border-radius: 16px; padding: 40px 20px; }
        .chart-grid { display: grid; gap: 4px; align-items: stretch; } 
        .chart-col { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .chart-top, .chart-bottom { display: flex; flex-direction: column; align-items: center; width: 100%; flex: 1; height: 200px; min-height: 200px; flex-shrink: 0; }
        .chart-top { justify-content: flex-end; padding-bottom: 10px; } 
        .chart-bottom { justify-content: flex-start; padding-top: 10px; } 
        
        .axis-label { width: 100%; text-align: center; font-size: 26px; font-weight: 700; padding: 0; margin: 8px 0; height: 90px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .watermark-img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; transition: 0.3s;}

        /* ========= 主题1：美联储 (无点线深色) ========= */
        .theme-fed { background-color: #12182b; color: #ffffff; width: 1242px; }
        .theme-fed .event-tag { background-color: #ff5722; }
        .theme-fed .event-desc { color: #a0a5b5; }
        .theme-fed .chart-box { background-color: #1a2238; border: 1px solid rgba(255,255,255,0.05); }
        .theme-fed .axis-label { border-bottom: 2px solid rgba(255, 255, 255, 0.4); color: #fff;}
        .theme-fed .val-up { color: #ff5722; font-size: 26px; font-weight: 900; margin-bottom: 12px;}
        .theme-fed .bar-up { width: 36px; background: linear-gradient(180deg, #ff5722 0%, rgba(255,87,34,0.6) 100%); border-radius: 4px 4px 0 0; }
        .theme-fed .val-down { color: #4ade80; font-size: 26px; font-weight: 900; margin-top: 12px;}
        .theme-fed .bar-down { width: 36px; background: linear-gradient(0deg, #4ade80 0%, rgba(74,222,128,0.6) 100%); border-radius: 0 0 4px 4px; }
        .theme-fed .watermark-img { filter: brightness(0) invert(1); opacity: 0.12; width: 380px; }

        /* ========= 主题2：非农 (浅色) ========= */
        .theme-nfp { background-color: #f5f6f8; color: #222222; width: 1242px; }
        .theme-nfp .timeline-container { padding-top: 10px; }
        .theme-nfp .event-card { background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); border: 1px solid #ebeef5; }
        .theme-nfp .event-tag { background-color: #e6a23c; }
        .theme-nfp .event-desc { color: #555; }
        .theme-nfp .chart-box { background-color: #fafbfc; border: 1px solid #ebeef5; }
        .theme-nfp .axis-label { border-bottom: 2px solid #dcdfe6; color: #333; }
        .theme-nfp .val-up { color: #d32f2f; font-size: 26px; font-weight: 900; margin-bottom: 12px;}
        .theme-nfp .bar-up { width: 36px; background: linear-gradient(180deg, #d32f2f 0%, rgba(211,47,47,0.6) 100%); border-radius: 4px 4px 0 0; }
        .theme-nfp .val-down { color: #388e3c; font-size: 26px; font-weight: 900; margin-top: 12px;}
        .theme-nfp .bar-down { width: 36px; background: linear-gradient(0deg, #388e3c 0%, rgba(56,142,60,0.6) 100%); border-radius: 0 0 4px 4px; }
        .theme-nfp .watermark-img { filter: brightness(0); opacity: 0.06; width: 380px; }

        /* ========= 主题3：USDA 供需报告 (超宽2613px表格模式) ========= */
        .theme-usda { background-color: #12182b; color: #ffffff; width: 2613px; }
        .theme-usda .timeline-container { padding: 60px 80px; position: relative; z-index: 1;}
        .theme-usda .usda-table-container { width: 100%; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.3); background: #ffffff; border: 2px solid #333; position: relative; z-index: 2;}
        .theme-usda .usda-thead { display: flex; background: #d32f2f; color: #fff; } 
        
        /* 🔥强制加入 box-sizing: border-box 并让标题居中，彻底修复错位🔥 */
        .theme-usda .usda-th { box-sizing: border-box; display: flex; align-items: center; justify-content: center; font-size: 56px; font-weight: 900; padding: 45px 30px; text-align: center; border-right: 2px solid rgba(255,255,255,0.2); }
        .theme-usda .usda-th:last-child { border-right: none; }
        
        .theme-usda .usda-tbody { display: flex; flex-direction: column; }
        .theme-usda .usda-tr { display: flex; border-top: 2px solid #e5e7eb; align-items: stretch; }
        .theme-usda .usda-row-even { background: #ffffff; }
        .theme-usda .usda-row-odd { background: #f9fafb; }
        
        /* 🔥强制加入 box-sizing: border-box 约束宽度🔥 */
        .theme-usda .usda-td { box-sizing: border-box; display: flex; align-items: center; padding: 50px 40px; line-height: 1.7; border-right: 2px solid #e5e7eb; }
        .theme-usda .usda-td:last-child { border-right: none; }
        
        /* 剥离列宽和内容对齐：统一在此处强制规定三列的严格宽度 */
        .theme-usda .col-year { width: 350px; flex-shrink: 0; }
        .theme-usda .col-reason { flex: 1; min-width: 0; }
        .theme-usda .col-change { width: 550px; flex-shrink: 0; }
        
        /* 单独处理 TD 内部的样式展示 */
        .theme-usda .usda-td.col-year { justify-content: center; font-weight: 900; font-size: 58px; color: #000; }
        .theme-usda .usda-td.col-reason { justify-content: flex-start; text-align: left; font-size: 50px; color: #333; }
        .theme-usda .usda-td.col-change { justify-content: center; font-weight: 900; font-size: 68px; }
        
        .theme-usda .watermark-img { filter: brightness(0); opacity: 0.05; width: 1200px; z-index: 0; }

        .footer-cta { display: flex; align-items: center; justify-content: center; overflow: hidden;}
        .footer-standard { border-top: 1px solid rgba(128, 128, 128, 0.1); padding: 80px 40px; }
        .qr-box { width: 220px; height: 220px; background: #fff; padding: 16px; border-radius: 16px; margin-right: 40px; }
        .qr-box img { width: 100%; height: 100%; object-fit: cover; }
        .cta-text { font-size: 52px; font-weight: 900; line-height: 1.5; letter-spacing: 2px; color: inherit;}
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="mode-switcher">
            <div class="mode-tab active" onclick="switchMode('fed')" id="tab-fed">🏦 美联储</div>
            <div class="mode-tab" onclick="switchMode('nfp')" id="tab-nfp">💼 非农</div>
            <div class="mode-tab" onclick="switchMode('usda')" id="tab-usda">🌾 USDA</div>
        </div>
        
        <div class="panel-body" id="input-container-normal">
            <div class="form-group"><label>公布日期</label><input type="text" id="input-date"></div>
            <div class="form-group"><label>标签</label><input type="text" id="input-tag"></div>
            <div class="form-group"><label>文案内容</label><textarea id="input-desc"></textarea></div>
            <div class="rates-grid" id="rates-grid-container"></div>
            
            <button class="btn-add" onclick="submitData()" id="submit-btn">➕ 添加/保存数据</button>
            <button class="btn-cancel" onclick="cancelEdit()" id="cancel-edit-btn">放弃修改</button>
        </div>

        <div class="panel-body" id="input-container-usda" style="display: none;">
            <div class="form-group">
                <label style="color:#d32f2f; font-size:15px;">👉 当前正在查看/操作的报告月份：</label>
                <select id="usda-month-select" onchange="renderUsdaList(); updateViews();" style="border: 2px solid #d32f2f; font-weight: bold; color: #d32f2f;">
                    <option value="1">1月供需报告</option>
                    <option value="2">2月供需报告</option>
                    <option value="3">3月供需报告</option>
                    <option value="4">4月供需报告</option>
                    <option value="5">5月供需报告</option>
                    <option value="6">6月供需报告</option>
                    <option value="7">7月供需报告</option>
                    <option value="8">8月供需报告</option>
                    <option value="9">9月供需报告</option>
                    <option value="10">10月供需报告</option>
                    <option value="11">11月供需报告</option>
                    <option value="12">12月供需报告</option>
                </select>
            </div>
            <div style="border-top: 1px dashed #ccc; margin: 20px 0;"></div>
            <div class="form-group"><label>年份</label><input type="text" id="usda-input-year" placeholder="例如：2026年"></div>
            <div class="form-group"><label>CBOT大豆涨跌幅</label><input type="text" id="usda-input-change" placeholder="例如：-1.52% 或者 +2.0%"></div>
            <div class="form-group"><label>报告核心逻辑 / 行情回顾</label><textarea id="usda-input-reason" style="height: 120px;" placeholder="输入文字..."></textarea></div>
            
            <button class="btn-add" onclick="submitUsdaData()" id="usda-submit-btn">➕ 存入该月数据</button>
            <button class="btn-cancel" onclick="cancelUsdaEdit()" id="usda-cancel-edit-btn">放弃修改</button>
        </div>

        <div class="panel-body" style="padding-top: 0;">
            <div class="data-list-title">
                <span id="admin-list-title">历史管理</span>
                <div>
                    <button onclick="importJSON()" style="font-size: 12px; padding: 4px 8px; cursor: pointer; background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; border-radius: 4px;">📥 导入JSON</button>
                </div>
            </div>
            <div id="admin-data-list"></div>
        </div>

        <div class="panel-footer">
            <button class="btn-export" onclick="generatePoster()" id="export-btn" style="background:#ff5722; color:#fff; width:100%; padding:15px; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer;">⬇ 导出高清长图</button>
            <p><a href="https://squoosh.app/" target="_blank" style="color:#1890ff; font-size:13px; text-decoration:none; font-weight:bold;">图片太大？去压缩 🗜️</a></p>
        </div>
    </div>

    <div class="right-panel">
        <div id="poster-scale-wrapper" style="transform: scale(0.65);">
            <div class="poster-container theme-fed" id="poster-capture">
                <img class="watermark-img" src="./watermark.svg">
                
                <div class="header-image"><img id="poster-header-img" src="./header-bg.jpg"></div>
                <div class="timeline-container" id="dynamic-timeline"></div>
                
                <div class="disclaimer-text" id="poster-disclaimer" style="text-align: center; font-size: 22px; padding-bottom: 30px; opacity: 0.6;">注：以上均为公布当日品种行情日线涨跌</div>
                <div class="footer-cta footer-standard" id="poster-footer">
                    <div class="qr-box"><img src="./qrcode.png"></div>
                    <div class="cta-text">扫码下载金十期货APP<br><span style="color:#ff5722">重要数据不会错过>></span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fedData = [
            {date:"2026年3月19日",tag:"会议要点",desc:"美联储维持利率在3.5%-3.75%不变，连续第二次按兵不动；理事米兰投下反对票，认为应降息25个基点。点阵图中值维持2026年降息一次、2027年降息一次的预测，长期联邦基金利率预期中值小幅上调。能源价格上涨将推高整体通胀，现在判断幅度还为时过早。此次能源供应冲击是一次性的事件。",commodities:[{name:"CBOT大豆",rate:0.41},{name:"WTI原油",rate:-4.59},{name:"现货黄金",rate:-3.49},{name:"大连铁矿石",rate:-0.39},{name:"LME铜",rate:-1.05}]},
            {date:"2026年1月29日",tag:"会议要点",desc:"2026年首场利率决议，美联储将基准利率维持在3.50%-3.75%不变，暂停了自去年9月以来的连续三次降息步伐，符合市场预期。理由是通胀仍处于较高水平且经济增长稳健。声明删除了有关就业下行风险上升的表述。鲍威尔表示，目前债务水平尚可维持但财政路径不可持续。预计关税对商品价格的影响将见顶并回落。",commodities:[{name:"CBOT大豆",rate:-0.26},{name:"WTI原油",rate:3.17},{name:"现货黄金",rate:-0.86},{name:"大连铁矿石",rate:1.98},{name:"LME铜",rate:4.46}]},
            {date:"2025年12月11日",tag:"会议要点",desc:"美联储将基准利率下调25个基点至3.50%-3.75%，为连续第三次会议降息，年内已累计降息75个基点。内部存在不同寻常的分歧，官员们暗示继续降息的意愿不高。鲍威尔表示利率政策已准备好应对未来经济形势，拒绝就近期是否会再次降息提供指引。他称加息并非基本预期，并暗示短期内可能会维持利率不变。",commodities:[{name:"CBOT大豆",rate:0.16},{name:"WTI原油",rate:-1.76},{name:"现货黄金",rate:1.22},{name:"大连铁矿石",rate:-1.56},{name:"LME铜",rate:2.37}]},
            {date:"2025年10月30日",tag:"会议要点",desc:"美联储如期降息25个基点，将基准利率目标区间下调至3.75%-4.00%。这是连续第二次降息，以防止招聘放缓演变成更严重的经济问题。鲍威尔做出了异常尖锐的表态，反驳了市场认为12月降息已是板上钉钉的预期，称“远非如此”，并表示由于政府停摆导致数据缺乏，官员面临非常高的经济前景不确定性。",commodities:[{name:"CBOT大豆",rate:-0.02},{name:"WTI原油",rate:-0.12},{name:"现货黄金",rate:2.43},{name:"大连铁矿石",rate:-0.25},{name:"LME铜",rate:-1.44}]},
            {date:"2025年9月18日",tag:"会议要点",desc:"美联储当地时间周三降息25个基点，为九个月来的首次降息。官员们认为，近期劳动力市场的疲软超过了对通胀回落的影响。多数官员预计今年至少还会再降息两次，这意味着美联储将在10月和12月的剩余两次会议上继续降息。鲍威尔称“属于风险平衡的转变”，降息是合适的。",commodities:[{name:"CBOT大豆",rate:-0.50},{name:"WTI原油",rate:-1.03},{name:"现货黄金",rate:-0.42},{name:"大连铁矿石",rate:-0.56},{name:"LME铜",rate:-0.31}]},
            {date:"2025年7月31日",tag:"会议要点",desc:"美联储连续第五次会议按兵不动，将联邦基金利率目标区间维持在4.25%-4.5%不变。美联储表示，通胀仍略高，就业稳健，上半年经济增长放缓，不确定性依然较高。鲍威尔重申目前没理由降息，利率决定将更贴合市场预期，对经济活动的描述从“温和步伐扩张”改为“有所放缓”。",commodities:[{name:"CBOT大豆",rate:-0.23},{name:"WTI原油",rate:-1.37},{name:"现货黄金",rate:0.47},{name:"大连铁矿石",rate:0.51},{name:"LME铜",rate:0.27}]},

            {"month": 11,"year": "2013年","change": "2.33%","reason": "因美国农业部(USDA)下调全球库存预估"},
            {"month": 11,"year": "2012年","change": "-2.98%","reason": "因美国农业部(USDA)美国大豆幅度，且高于市场预期"},
            {"month": 11,"year": "2011年","change": "-1.62%","reason": "欧元区债务危机担忧加剧，压制了因美国农业部(USDA) 供需报告带来的利多影响"},
            {"month": 11,"year": "2010年","change": "4.26%","reason": "因美国农业部（USDA）意外下调美国大豆单产预估"},
            {"month": 12,"year": "2024年","change": "0.03%","reason": "美国玉米出口增加，期末库存下调，美玉米走强带动美豆走强。总体来看，大豆报告偏中性"},
            {"month": 12,"year": "2023年","change": "-0.32%","reason": "USDA对于巴西旧作大豆产量再上修，致全球23/24年度大豆库存降幅不及市场预期"},
            {"month": 12,"year": "2022年","change": "-0.27%","reason": "USDA对2022/23年度全球大豆产量和出口进行上调，带动全球大豆供应上调"},
            {"month": 12,"year": "2021年","change": "0.30%","reason": "USDA公布的美国大豆期末库存略低于市场预期，报告中性略偏多"},
            {"month": 12,"year": "2020年","change": "0.63%","reason": "USDA小幅下调美豆结转库存和南美产量预期，市场继续关注南美天气"},
            {"month": 12,"year": "2019年","change": "0.45%","reason": "USDA维持美豆产量及期末库存预估不变，报告相对中性，但中美贸易谈判前景改善提振美豆期价上涨"},
            {"month": 12,"year": "2018年","change": "0.58%","reason": "USDA维持美豆期末库存预估，但上调全球大豆期货库存，不过中美贸易形势可能改善抵消这一不利影响"},
            {"month": 12,"year": "2017年","change": "-0.69%","reason": "USDA上调美国大豆期末库存预估，并同时上调巴西大豆产量预测数据"},
            {"month": 12,"year": "2016年","change": "1.00%","reason": "USDA维持美国大豆期末库存预估数据不变，但稍高于此前预期，不过技术买盘活跃及阿根廷产区干燥天气令人担忧"},
            {"month": 12,"year": "2015年","change": "0.00%","reason": "USDA维持美国大豆期末库存预估数据不变，但高于此前预期，不过美元走软抵消此不利影响"},
            {"month": 12,"year": "2014年","change": "-1.64%","reason": "因预计巴西大豆产量创纪录和获利了结带来的压力盖过了美国大豆库存预估下调的利好影响。"},
            {"month": 12,"year": "2013年","change": "-0.41%","reason": "USDA下调美国大豆期末库存预估，但获利了结及南美丰产预期盖过了此利多影响"},
            {"month": 12,"year": "2012年","change": "-0.19%","reason": "USDA下调美国大豆期末库存预估，但邻池小麦暴跌带来的比价效应盖过了此利多影响"},
            {"month": 12,"year": "2011年","change": "-2.25%","reason": "USDA上调美国大豆库存预估，且高于此前市场预期"},
            {"month": 12,"year": "2010年","change": "-0.66%","reason": "USDA公布的美国大豆期末库存高于此前预期"}
        ];


        let state = { 
            mode: 'fed', 
            idx: -1, 
            fed: { data: JSON.parse(localStorage.getItem('f23')) || fedData, c: ["CBOT大豆","WTI原油","现货黄金","大连铁矿石","LME铜"] }, 
            nfp: { data: JSON.parse(localStorage.getItem('n23')) || nfpData, c: ["沪金","沪银","沪铝","沪铜","伦铜","伦铝","WTI原油","CBOT大豆","现货黄金","现货白银"] },
            usda: { data: JSON.parse(localStorage.getItem('u23')) || usdaData, c: [] },
            usdaMonth: 1 
        };

        function switchMode(m){ 
            state.mode = m; 
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.id === `tab-${m}`)); 
            
            const captureArea = document.getElementById('poster-capture');
            captureArea.className = `poster-container theme-${m}`; 
            
            if(m === 'usda') {
                document.getElementById('input-container-normal').style.display = 'none';
                document.getElementById('input-container-usda').style.display = 'block';
                captureArea.style.width = '2613px';
                document.getElementById('poster-scale-wrapper').style.transform = 'scale(0.35)';
                document.getElementById('poster-header-img').src = './header-usda.jpg';
                document.getElementById('poster-footer').innerHTML = `<img src="./二维码.png" style="width: 100%; display: block;">`;
                document.getElementById('poster-footer').style.padding = '0';
                renderUsdaList();
            } else {
                document.getElementById('input-container-normal').style.display = 'block';
                document.getElementById('input-container-usda').style.display = 'none';
                captureArea.style.width = '1242px';
                document.getElementById('poster-scale-wrapper').style.transform = 'scale(0.65)';
                document.getElementById('poster-header-img').src = m === 'fed' ? './header-bg.jpg' : './header-nfp.jpg';
                document.getElementById('input-tag').value = m === 'fed' ? '会议要点' : '数据亮点';
                document.getElementById('poster-footer').innerHTML = `
                    <div class="qr-box"><img src="./qrcode.png"></div>
                    <div class="cta-text">扫码下载金十期货APP<br><span style="color:#ff5722">重要数据不会错过>></span></div>`;
                document.getElementById('poster-footer').style.padding = '80px 40px';
                renderInput(); 
            }

            cancelEdit(); 
            updateViews(); 
        }

        function renderInput(v={}){ 
            const g=document.getElementById('rates-grid-container'); 
            let h=''; 
            state[state.mode].c.forEach((n,i)=>{
                h+=`<div class="rate-item"><div class="rate-item-close" onclick="remC(${i})">✖</div><label>${n}</label><input type="number" id="ri-${i}" step="0.01" value="${v[n]!==undefined?v[n]:''}"></div>`;
            }); 
            h+=`<div class="add-type-btn" style="border:1px dashed #ccc; border-radius:6px; cursor:pointer; display:flex; justify-content:center; align-items:center; font-size:13px; font-weight:bold; color:#888;" onclick="addC()">+ 新增品种</div>`; 
            g.innerHTML=h; 
        }
        function getV(){ let v={}; state[state.mode].c.forEach((n,i)=>{ let el=document.getElementById(`ri-${i}`); if(el)v[n]=el.value; }); return v; }
        function addC(){ let n=prompt("请输入新增的品种名称 (例如：沪铝)："); if(n&&n.trim()!==''){ let cv=getV(); state[state.mode].c.push(n.trim()); renderInput(cv); } }
        function remC(i){ if(confirm(`确定删除品种【${state[state.mode].c[i]}】吗？`)){ let cv=getV(); state[state.mode].c.splice(i,1); renderInput(cv); } }
        function submitData(){ let d=document.getElementById('input-date').value, de=document.getElementById('input-desc').value; if(!d||!de)return alert("日期和文案为必填项！"); let it={date:d, tag:document.getElementById('input-tag').value, desc:de, commodities:state[state.mode].c.map((n,i)=>({name:n, rate:parseFloat(document.getElementById(`ri-${i}`).value)||0}))}; if(state.idx===-1)state[state.mode].data.unshift(it); else { state[state.mode].data[state.idx]=it; cancelEdit(); } updateViews(); }

        function renderUsdaList() {
            state.usdaMonth = parseInt(document.getElementById('usda-month-select').value);
        }
        function submitUsdaData() {
            let y = document.getElementById('usda-input-year').value;
            let r = document.getElementById('usda-input-reason').value;
            let c = document.getElementById('usda-input-change').value;
            if(!y || !r) return alert("年份和核心逻辑为必填项！");
            let it = { month: state.usdaMonth, year: y, change: c, reason: r };
            if(state.idx === -1) { state.usda.data.push(it); } 
            else { state.usda.data[state.idx] = it; cancelUsdaEdit(); }
            updateViews();
            document.getElementById('usda-input-year').value = '';
            document.getElementById('usda-input-reason').value = '';
            document.getElementById('usda-input-change').value = '';
        }
        function editUsdaD(globalIdx) {
            state.idx = globalIdx;
            let it = state.usda.data[globalIdx];
            document.getElementById('usda-input-year').value = it.year;
            document.getElementById('usda-input-reason').value = it.reason;
            document.getElementById('usda-input-change').value = it.change;
            document.getElementById('usda-submit-btn').innerText = '💾 保存修改';
            document.getElementById('usda-submit-btn').style.background = 'var(--btn-success)';
            document.getElementById('usda-cancel-edit-btn').style.display = 'block';
        }
        function cancelUsdaEdit() {
            state.idx = -1;
            document.getElementById('usda-submit-btn').innerText = '➕ 存入该月数据';
            document.getElementById('usda-submit-btn').style.background = 'var(--btn-primary)';
            document.getElementById('usda-cancel-edit-btn').style.display = 'none';
            document.getElementById('usda-input-year').value = '';
            document.getElementById('usda-input-reason').value = '';
            document.getElementById('usda-input-change').value = '';
        }

        function updateViews(){ 
            const cur=state[state.mode]; 
            let storageKey = state.mode === 'fed' ? 'f23' : (state.mode === 'nfp' ? 'n23' : 'u23');
            localStorage.setItem(storageKey, JSON.stringify(cur.data)); 
            
            const l = document.getElementById('admin-data-list'); l.innerHTML=''; 
            const p = document.getElementById('dynamic-timeline'); p.innerHTML=''; 

            if (state.mode === 'usda') {
                document.getElementById('admin-list-title').innerText = `历史管理 (${state.usdaMonth}月)`;
                
                let filteredData = cur.data.map((item, originalIndex) => ({...item, originalIndex}))
                                           .filter(item => parseInt(item.month) === state.usdaMonth)
                                           .sort((a, b) => parseInt(b.year) - parseInt(a.year)); 

                filteredData.forEach(it => {
                    l.innerHTML+=`<div class="data-item"><span><b>${it.year}</b><br><span style="color:#999;font-size:12px;">${it.reason.substring(0, 15)}...</span></span><div><button onclick="copySingleJSON(${it.originalIndex})" style="background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 4px;">复制</button><button class="btn-edit" onclick="editUsdaD(${it.originalIndex})">改</button><button class="btn-delete" onclick="delD(${it.originalIndex})">删</button></div></div>`;
                });

                let tableHtml = `
                    <div style="text-align: center; font-size: 80px; font-family: 'Noto Serif SC', serif; font-weight: 900; color: #1a1a1a; margin-bottom: 50px; letter-spacing: 5px;">
                        历年<span style="color: #d32f2f;">${state.usdaMonth}月</span>USDA供需报告回顾
                    </div>
                    <div class="usda-table-container">
                        <div class="usda-thead">
                            <div class="usda-th col-year">年份</div>
                            <div class="usda-th col-reason">USDA供需报告内容及行情回顾</div>
                            <div class="usda-th col-change">CBOT大豆涨跌幅</div>
                        </div>
                        <div class="usda-tbody">
                `;
                
                filteredData.forEach((row, i) => {
                    let displayC = String(row.change).trim();
                    let cVal = parseFloat(displayC.replace('%', ''));
                    let colorStyle = '#666';
                    
                    if (!isNaN(cVal)) {
                        if (cVal > 0) { 
                            colorStyle = '#d32f2f'; 
                            if(!displayC.startsWith('+')) displayC = '+' + displayC; 
                        } else if (cVal < 0) { 
                            colorStyle = '#388e3c'; 
                        }
                        if (!displayC.includes('%')) displayC += '%';
                    }

                    tableHtml += `
                        <div class="usda-tr ${i % 2 === 0 ? 'usda-row-even' : 'usda-row-odd'}">
                            <div class="usda-td col-year">${row.year}</div>
                            <div class="usda-td col-reason">${row.reason}</div>
                            <div class="usda-td col-change"><span style="color: ${colorStyle};">${displayC}</span></div>
                        </div>
                    `;
                });
                tableHtml += `</div></div>`;
                p.innerHTML = tableHtml;

            } else {
                document.getElementById('admin-list-title').innerText = "历史管理";
                
                cur.data.forEach((it,i)=>{l.innerHTML+=`<div class="data-item"><span><b>${it.date}</b><br><span style="color:#999;font-size:12px;">${it.desc.substring(0, 16)}...</span></span><div><button onclick="copySingleJSON(${i})" style="background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 4px;">复制</button><button class="btn-edit" onclick="editD(${i})">改</button><button class="btn-delete" onclick="delD(${i})">删</button></div></div>`;}); 
                
                cur.data.forEach(ev=>{ 
                    let max=Math.max(...ev.commodities.map(c=>Math.abs(c.rate)))||1; let ch=''; 
                    let valFs = '26px'; let labFs = '26px';
                    let labWrap = state.mode === 'nfp' ? 'white-space: normal; line-height: 1.2;' : 'white-space: nowrap;';

                    ev.commodities.forEach(c=>{ 
                        let h=Math.max((Math.abs(c.rate)/max)*120,4); let u=c.rate>=0; 
                        let displayName = c.name;
                        if(state.mode === 'nfp'){
                            displayName = c.name.replace('WTI原油', 'WTI<br>原油').replace('CBOT大豆', 'CBOT<br>大豆').replace('现货黄金', '现货<br>黄金').replace('现货白银', '现货<br>白银').replace('大连铁矿石', '大连<br>铁矿石');
                        }

                        ch+=`<div class="chart-col">
                                ${u?`<div class="chart-top"><div class="val-up" style="font-size:${valFs}; margin-bottom: 6px;">+${c.rate}%</div><div class="bar-up" style="height:${h}px"></div></div>`:'<div class="chart-top"></div>'}
                                <div class="axis-label" style="font-size:${labFs}; ${labWrap}">${displayName}</div>
                                ${!u?`<div class="chart-bottom"><div class="bar-down" style="height:${h}px"></div><div class="val-down" style="font-size:${valFs}; margin-top: 6px;">${c.rate}%</div></div>`:'<div class="chart-bottom"></div>'}
                            </div>`; 
                    }); 
                    p.innerHTML+=`<div class="event-card"><div class="event-header"><div class="event-date">${ev.date}</div><div class="event-tag">${ev.tag}</div></div><div class="event-desc">${ev.desc}</div><div class="chart-box" style="display:grid; grid-template-columns:repeat(${ev.commodities.length},1fr)">${ch}</div></div>`; 
                }); 
            }
        }

        function editD(i){ state.idx=i; let it=state[state.mode].data[i]; document.getElementById('input-date').value=it.date; document.getElementById('input-tag').value=it.tag; document.getElementById('input-desc').value=it.desc; state[state.mode].c=it.commodities.map(c=>c.name); let v={}; it.commodities.forEach(c=>v[c.name]=c.rate); renderInput(v); document.getElementById('submit-btn').innerText='💾 保存修改'; document.getElementById('submit-btn').style.background='var(--btn-success)'; document.getElementById('cancel-edit-btn').style.display='block'; }
        function cancelEdit(){ state.idx=-1; document.getElementById('submit-btn').innerText='➕ 添加/保存数据'; document.getElementById('submit-btn').style.background='var(--btn-primary)'; document.getElementById('cancel-edit-btn').style.display='none'; document.getElementById('input-date').value=''; document.getElementById('input-desc').value=''; renderInput(); }
        function delD(i){ if(confirm("确认删除？")){ state[state.mode].data.splice(i,1); updateViews(); } }
        
        function generatePoster(){ 
            let b=document.getElementById('export-btn'); b.innerText='拼命生成中...'; b.style.opacity='0.7';
            let w=document.getElementById('poster-scale-wrapper'); w.style.transform='scale(1)'; 
            
            let targetW = state.mode === 'usda' ? 2613 : 1242;

            setTimeout(()=>{ 
                html2canvas(document.getElementById('poster-capture'),{
                    width: targetW,
                    scale: 1.5,
                    useCORS: true
                }).then(c=>{ 
                    let l=document.createElement('a'); 
                    let filenameMap = {'fed':'美联储', 'nfp':'非农', 'usda':'USDA'};
                    l.download=`${filenameMap[state.mode]}数据长图.jpg`; 
                    l.href=c.toDataURL('image/jpeg',0.8); 
                    l.click(); 
                    
                    w.style.transform = state.mode === 'usda' ? 'scale(0.35)' : 'scale(0.65)'; 
                    b.innerText='⬇ 导出高清长图'; 
                    b.style.opacity='1';
                });
            }, 300); 
        }

        function copySingleJSON(i) {
            const jsonStr = JSON.stringify(state[state.mode].data[i], null, 2);
            navigator.clipboard.writeText(jsonStr).then(() => alert("✅ 单条数据已复制！可以直接发给AI或导入。")).catch(err => alert("复制失败，请检查浏览器权限。"));
        }

        function importJSON() {
            const jsonStr = prompt("请在此粘贴 JSON 代码：");
            if (jsonStr && jsonStr.trim()) {
                try {
                    const parsed = JSON.parse(jsonStr);
                    if (Array.isArray(parsed)) {
                        state[state.mode].data = parsed; updateViews(); alert("✅ 全部数据导入成功并已覆盖！");
                    } else if (typeof parsed === 'object' && parsed !== null) {
                        if(state.mode === 'usda' && !parsed.month) {
                            alert("❌ 导入失败：USDA模式需要包含 month 字段的 JSON！"); return;
                        }
                        if(state.mode !== 'usda' && !parsed.date) {
                            alert("❌ 导入失败：当前模式需要包含 date 字段的 JSON！"); return;
                        }
                        
                        if(state.mode === 'usda') {
                            state.usda.data.push(parsed); 
                            document.getElementById('usda-month-select').value = parsed.month;
                            renderUsdaList();
                        } else {
                            state[state.mode].data.unshift(parsed);
                        }
                        updateViews();
                        alert("✅ 单条数据导入成功，已安全添加！");
                    } else { alert("❌ 格式错误：请粘贴正确的 JSON！"); }
                } catch (e) { alert("❌ 解析失败：请确保粘贴的是合法的 JSON 格式！"); }
            }
        }
        
        switchMode('fed');
    </script>
</body>
</html>
